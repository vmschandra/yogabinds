<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | YogaBinds</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--green-bg-soft);
    }

    .admin-login-box {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .admin-login-box h2 {
      font-family: var(--font-heading);
      margin-bottom: 8px;
    }

    .admin-login-box p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .admin-login-box .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .admin-login-box .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .admin-login-box .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: var(--font-body);
      box-sizing: border-box;
    }

    .admin-login-box .btn {
      width: 100%;
      margin-top: 12px;
    }

    .admin-error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    /* Dashboard */
    .admin-dashboard {
      display: none;
      padding-top: 120px;
      min-height: 100vh;
      background: var(--green-bg-soft);
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .admin-header h1 {
      font-size: 2rem;
    }

    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .admin-tab {
      padding: 10px 24px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .admin-tab:hover {
      border-color: var(--green-mid);
      color: var(--green-dark);
    }

    .admin-tab.active {
      background: var(--green-dark);
      color: #fff;
      border-color: var(--green-dark);
    }

    .admin-panel {
      display: none;
    }

    .admin-panel.active {
      display: block;
    }

    .admin-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .admin-card h4 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: var(--green-dark);
    }

    .admin-card-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .admin-card-label {
      font-weight: 600;
      color: var(--text-primary);
      min-width: 110px;
      flex-shrink: 0;
    }

    .admin-card-value {
      color: var(--text-muted);
    }

    .admin-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .admin-badge.intro {
      background: var(--green-bg);
      color: var(--green-dark);
      border: 1px solid var(--green-lighter);
    }

    .admin-badge.casual {
      background: #fef9e7;
      color: #7d6608;
      border: 1px solid #f9e79f;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .admin-stat-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .admin-stat-card .stat-number {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .admin-stat-card .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .admin-empty {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .admin-loading {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .admin-login-box {
        margin: 20px;
        padding: 32px 24px;
      }

      .admin-card-row {
        flex-direction: column;
        gap: 2px;
      }

      .admin-card-label {
        min-width: auto;
      }
    }
  </style>
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div class="admin-login" id="adminLogin">
    <div class="admin-login-box">
      <h2>Admin Login</h2>
      <p>YogaBinds Dashboard</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="adminUser">Username</label>
          <input type="text" id="adminUser" placeholder="Enter username" required />
        </div>
        <div class="form-group">
          <label for="adminPass">Password</label>
          <input type="password" id="adminPass" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
        <p class="admin-error" id="loginError">Invalid credentials. Please try again.</p>
      </form>
    </div>
  </div>

  <!-- ========== DASHBOARD ========== -->
  <div class="admin-dashboard" id="adminDashboard">

    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <a href="admin.html" class="navbar-brand">Yoga<span>Binds</span> <small style="font-size: 0.6rem; opacity: 0.7; margin-left: 6px;">ADMIN</small></a>
        <ul class="navbar-links">
          <li><a href="index.html">View Site</a></li>
          <li><a href="#" id="logoutBtn">Log Out</a></li>
        </ul>
      </div>
    </nav>

    <div class="container" style="padding-top: 20px; padding-bottom: 60px;">

      <div class="admin-header">
        <h1>Dashboard</h1>
      </div>

      <!-- Stats -->
      <div class="admin-stats" id="adminStats">
        <div class="admin-stat-card">
          <div class="stat-number" id="statBookings">-</div>
          <div class="stat-label">Total Bookings</div>
        </div>
        <div class="admin-stat-card">
          <div class="stat-number" id="statIntro">-</div>
          <div class="stat-label">Intro Offers</div>
        </div>
        <div class="admin-stat-card">
          <div class="stat-number" id="statCasual">-</div>
          <div class="stat-label">Casual Classes</div>
        </div>
        <div class="admin-stat-card">
          <div class="stat-number" id="statFeedback">-</div>
          <div class="stat-label">Feedback</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="bookings">Bookings</button>
        <button class="admin-tab" data-tab="feedback">Feedback</button>
        <button class="admin-tab" data-tab="contacts">Contact Messages</button>
      </div>

      <!-- Bookings Panel -->
      <div class="admin-panel active" id="panel-bookings">
        <div class="admin-loading">Loading bookings...</div>
      </div>

      <!-- Feedback Panel -->
      <div class="admin-panel" id="panel-feedback">
        <div class="admin-loading">Loading feedback...</div>
      </div>

      <!-- Contacts Panel -->
      <div class="admin-panel" id="panel-contacts">
        <div class="admin-loading">Loading messages...</div>
      </div>

    </div>
  </div>

  <script type="module">
    import { getBookings, getFeedback, getContacts } from './firebase.js';

    function escapeHTML(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ---- Credentials (SHA-256 hashed) ----
    var ADMIN_USER_HASH = '1e85c4464bf5466e72fdd636eebdd11add8ec93ac2e62ada818e2e5f0da4d777';
    var ADMIN_PASS_HASH = '09d6b9e904af1183e2c60c24eeb735dd1c2205638afbef26745254f9ab5fb297';

    async function hashString(str) {
      var encoder = new TextEncoder();
      var data = encoder.encode(str);
      var hashBuffer = await crypto.subtle.digest('SHA-256', data);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    var loginForm = document.getElementById('loginForm');
    var loginError = document.getElementById('loginError');
    var adminLogin = document.getElementById('adminLogin');
    var adminDashboard = document.getElementById('adminDashboard');
    var submitBtn = loginForm.querySelector('button[type="submit"]');

    // ---- Login attempt lockout ----
    var MAX_ATTEMPTS = 5;
    var LOCKOUT_DURATION = 5 * 60 * 1000; // 5 minutes
    var failedAttempts = parseInt(sessionStorage.getItem('yogabinds_admin_fails') || '0');
    var lockoutUntil = parseInt(sessionStorage.getItem('yogabinds_admin_lockout') || '0');

    function checkLockout() {
      if (lockoutUntil && Date.now() < lockoutUntil) {
        var remaining = Math.ceil((lockoutUntil - Date.now()) / 60000);
        loginError.textContent = 'Too many failed attempts. Try again in ' + remaining + ' minute' + (remaining > 1 ? 's' : '') + '.';
        loginError.style.display = 'block';
        submitBtn.disabled = true;
        return true;
      }
      if (lockoutUntil && Date.now() >= lockoutUntil) {
        // Lockout expired — reset
        failedAttempts = 0;
        sessionStorage.removeItem('yogabinds_admin_fails');
        sessionStorage.removeItem('yogabinds_admin_lockout');
        lockoutUntil = 0;
        submitBtn.disabled = false;
        loginError.style.display = 'none';
      }
      return false;
    }
    checkLockout();

    // Check session with 30-minute expiration
    var SESSION_TIMEOUT = 30 * 60 * 1000;
    var adminSession = sessionStorage.getItem('yogabinds_admin');
    var adminTime = parseInt(sessionStorage.getItem('yogabinds_admin_time') || '0');
    if (adminSession === 'true' && (Date.now() - adminTime) < SESSION_TIMEOUT) {
      showDashboard();
    } else {
      sessionStorage.removeItem('yogabinds_admin');
      sessionStorage.removeItem('yogabinds_admin_time');
    }

    // Auto-expire session every minute
    setInterval(function() {
      var t = parseInt(sessionStorage.getItem('yogabinds_admin_time') || '0');
      if (t && (Date.now() - t) > SESSION_TIMEOUT) {
        sessionStorage.removeItem('yogabinds_admin');
        sessionStorage.removeItem('yogabinds_admin_time');
        location.reload();
      }
      checkLockout();
    }, 60000);

    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      if (checkLockout()) return;

      var user = document.getElementById('adminUser').value.trim();
      var pass = document.getElementById('adminPass').value;
      var userHash = await hashString(user);
      var passHash = await hashString(pass);

      if (userHash === ADMIN_USER_HASH && passHash === ADMIN_PASS_HASH) {
        // Reset failed attempts on success
        failedAttempts = 0;
        sessionStorage.removeItem('yogabinds_admin_fails');
        sessionStorage.removeItem('yogabinds_admin_lockout');
        sessionStorage.setItem('yogabinds_admin', 'true');
        sessionStorage.setItem('yogabinds_admin_time', Date.now().toString());
        // Clear credentials from DOM
        document.getElementById('adminUser').value = '';
        document.getElementById('adminPass').value = '';
        showDashboard();
      } else {
        failedAttempts++;
        sessionStorage.setItem('yogabinds_admin_fails', failedAttempts.toString());
        if (failedAttempts >= MAX_ATTEMPTS) {
          lockoutUntil = Date.now() + LOCKOUT_DURATION;
          sessionStorage.setItem('yogabinds_admin_lockout', lockoutUntil.toString());
          checkLockout();
        } else {
          loginError.textContent = 'Invalid credentials. ' + (MAX_ATTEMPTS - failedAttempts) + ' attempt' + (MAX_ATTEMPTS - failedAttempts > 1 ? 's' : '') + ' remaining.';
          loginError.style.display = 'block';
        }
        document.getElementById('adminPass').value = '';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      sessionStorage.removeItem('yogabinds_admin');
      sessionStorage.removeItem('yogabinds_admin_time');
      location.reload();
    });

    // ---- Tabs ----
    document.querySelectorAll('.admin-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.admin-panel').forEach(function(p) { p.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('panel-' + this.dataset.tab).classList.add('active');
      });
    });

    // ---- Dashboard ----
    async function showDashboard() {
      adminLogin.style.display = 'none';
      adminDashboard.style.display = 'block';
      await loadData();
    }

    async function loadData() {
      var [bookings, feedback, contacts] = await Promise.all([
        getBookings(),
        getFeedback(),
        getContacts()
      ]);

      // Stats
      var introCount = bookings.filter(function(b) { return b.plan === 'intro'; }).length;
      var casualCount = bookings.filter(function(b) { return b.plan === 'casual'; }).length;
      document.getElementById('statBookings').textContent = bookings.length;
      document.getElementById('statIntro').textContent = introCount;
      document.getElementById('statCasual').textContent = casualCount;
      document.getElementById('statFeedback').textContent = feedback.length;

      // Render bookings
      var bookingsPanel = document.getElementById('panel-bookings');
      if (bookings.length === 0) {
        bookingsPanel.innerHTML = '<div class="admin-empty">No bookings yet.</div>';
      } else {
        bookingsPanel.innerHTML = bookings.map(function(b) {
          var planLabel = b.plan === 'intro' ? 'Introductory Offer' : 'Casual Class';
          var badgeClass = b.plan === 'intro' ? 'intro' : 'casual';
          var dates = escapeHTML(b.classDates ? b.classDates.join(', ') : 'Not specified');
          var date = escapeHTML(b.createdAt ? new Date(b.createdAt.seconds * 1000).toLocaleDateString('en-AU') : '-');
          return '<div class="admin-card">' +
            '<span class="admin-badge ' + badgeClass + '">' + planLabel + '</span>' +
            '<h4>' + escapeHTML(b.fullName || 'Unknown') + '</h4>' +
            '<div class="admin-card-row"><span class="admin-card-label">Email:</span><span class="admin-card-value">' + escapeHTML(b.email || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Phone:</span><span class="admin-card-value">' + escapeHTML(b.phone || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Amount:</span><span class="admin-card-value">' + escapeHTML(b.amount || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Class Dates:</span><span class="admin-card-value">' + dates + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Account:</span><span class="admin-card-value">' + (b.accountCreated ? 'Yes' : 'Guest') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Card Last 4:</span><span class="admin-card-value">' + escapeHTML(b.cardLast4 || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Booked On:</span><span class="admin-card-value">' + date + '</span></div>' +
          '</div>';
        }).join('');
      }

      // Render feedback
      var feedbackPanel = document.getElementById('panel-feedback');
      if (feedback.length === 0) {
        feedbackPanel.innerHTML = '<div class="admin-empty">No feedback yet.</div>';
      } else {
        feedbackPanel.innerHTML = feedback.map(function(f) {
          var date = escapeHTML(f.createdAt ? new Date(f.createdAt.seconds * 1000).toLocaleDateString('en-AU') : '-');
          return '<div class="admin-card">' +
            '<h4>' + escapeHTML(f.name || 'Anonymous') + '</h4>' +
            '<div class="admin-card-row"><span class="admin-card-label">Email:</span><span class="admin-card-value">' + escapeHTML(f.email || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Message:</span><span class="admin-card-value">' + escapeHTML(f.message || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Date:</span><span class="admin-card-value">' + date + '</span></div>' +
          '</div>';
        }).join('');
      }

      // Render contacts
      var contactsPanel = document.getElementById('panel-contacts');
      if (contacts.length === 0) {
        contactsPanel.innerHTML = '<div class="admin-empty">No contact messages yet.</div>';
      } else {
        contactsPanel.innerHTML = contacts.map(function(c) {
          var date = escapeHTML(c.createdAt ? new Date(c.createdAt.seconds * 1000).toLocaleDateString('en-AU') : '-');
          return '<div class="admin-card">' +
            '<h4>' + escapeHTML(c.name || 'Anonymous') + '</h4>' +
            '<div class="admin-card-row"><span class="admin-card-label">Email:</span><span class="admin-card-value">' + escapeHTML(c.email || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Message:</span><span class="admin-card-value">' + escapeHTML(c.message || '-') + '</span></div>' +
            '<div class="admin-card-row"><span class="admin-card-label">Date:</span><span class="admin-card-value">' + date + '</span></div>' +
          '</div>';
        }).join('');
      }
    }
  </script>
</body>
</html>
